<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Test</title>
</head>
<body>
    <h1>Backend Authentication Test</h1>

    <button onclick="testLogin()">Test Login</button>
    <button onclick="testData()">Test Get Data</button>
    <button onclick="testSave()">Test Save Data</button>

    <div id="result"></div>

    <script>
        let sessionToken = null;

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/test-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin@inverted-exe.shop' })
                });

                const result = await response.json();
                if (response.ok) {
                    sessionToken = result.sessionToken;
                    document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
                } else {
                    document.getElementById('result').innerHTML = '<pre style="color:red">' + JSON.stringify(result, null, 2) + '</pre>';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '<pre style="color:red">Error: ' + error.message + '</pre>';
            }
        }

        async function testData() {
            if (!sessionToken) {
                alert('Login first!');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/admin/data', {
                    headers: { 'Authorization': `Bearer ${sessionToken}` }
                });

                const result = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<pre style="color:red">Error: ' + error.message + '</pre>';
            }
        }

        async function testSave() {
            if (!sessionToken) {
                alert('Login first!');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/admin/save', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${sessionToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: 'shop',
                        data: [{ id: 1, name: 'Test Product', price: 25 }]
                    })
                });

                const result = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<pre style="color:red">Error: ' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
